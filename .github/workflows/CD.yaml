# .github/workflows/cd.yml
# Alpha 0.1.1 Ai Edition
# W.I.P With gay timmy

name: AIC Robotic CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase Convertor
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Test Docker image
        run: |
          docker run --rm ghcr.io/${{ env.REPO_LC }}:latest python -c "print('congrats is running successfully!')"
      - name: Deployment Summary
        run: |
          echo "CD Pipeline Complete!"
          echo "Image uploaded to: ghcr.io/${{ env.REPO_LC }}"
          echo "Tags: latest, sha-${GITHUB_SHA::7}"
