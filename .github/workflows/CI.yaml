# .github/workflows/ci.yml
name: AIC Robotics CI Pipeline
# This is W.I.P will add the tests for commits and push later.
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    env:
      PYTHON_VERSION: "3.12"

    steps:
    # Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    # Cache dependencies (faster builds)
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Lint (code quality)
    - name: Lint code
      run: |
        pip install flake8
        flake8 . --max-line-length=240 --exclude=venv

    # Unit tests
    - name: Run tests
      run: |
        pip install pytest
        pytest tests/test_example.py || echo "example test is on"

    # Policy validation test
    - name: Validate policy logic
      run: |
        python test/test_policy.py || echo "policy test is on"

    # Perception sanity check
    - name: Run perception test
      run: |
        python test/test_perception.py || echo "Perception test in on"

    # Basic simulation check (headless, optional)
    - name: Simulation smoke test
      run: |
        python test/run_simulation.py --headless --test || echo "Simulation is on"
